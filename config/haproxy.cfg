# /etc/haproxy/haproxy.cfg
# HAProxy Load Balancing Configuration for uSecOps Ingestion VIP
# Utilizes pure TCP pass-through to preserve endpoint-to-collector mTLS handshakes.

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    user haproxy
    group haproxy
    daemon

    # Max SSL connections limit
    maxconn 20000

defaults
    log     global
    mode    tcp          # Force pure TCP layer-4 pass-through (vital for mTLS validation)
    option  tcplog
    option  dontlognull
    retries 3
    timeout queue           1m
    timeout connect         10s
    timeout client          1h
    timeout server          1h
    timeout check           2s

# 1. Frontends & Backends: OTel gRPC Receiver (Port 4317)
frontend otel_grpc_frontend
    bind 10.100.0.100:4317
    mode tcp
    default_backend otel_grpc_backend

backend otel_grpc_backend
    mode tcp
    balance leastconn    # Distribute traffic based on active sessions
    option tcp-check
    
    # Active nodes list
    server otel_node_01 10.100.0.10:4317 check inter 2000 fall 3 rise 2
    server otel_node_02 10.100.0.11:4317 check inter 2000 fall 3 rise 2
    server otel_node_03 10.100.0.12:4317 check inter 2000 fall 3 rise 2

# 2. Frontends & Backends: OTel HTTP/JSON Receiver (Port 4318)
frontend otel_http_frontend
    bind 10.100.0.100:4318
    mode tcp
    default_backend otel_http_backend

backend otel_http_backend
    mode tcp
    balance leastconn
    option tcp-check

    server otel_node_01 10.100.0.10:4318 check inter 2000 fall 3 rise 2
    server otel_node_02 10.100.0.11:4318 check inter 2000 fall 3 rise 2
    server otel_node_03 10.100.0.12:4318 check inter 2000 fall 3 rise 2
