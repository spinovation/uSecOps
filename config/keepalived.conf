# /etc/keepalived/keepalived.conf
# Keepalived Configuration for uSecOps Ingestion & Control VIPs
# Enforces active-passive VRRP redundancy with sub-second failover thresholds.

global_defs {
    router_id secops_ha_node_01
    enable_script_security
    script_user root
}

# 1. Health Auditing Script
vrrp_script check_otel_collector {
    script "/usr/bin/pgrep -x otel-collector"
    interval 2          # Check every 2 seconds
    weight -20          # Dynamically drop priority by 20 on failure
    fall 2              # Transition to failure after 2 consecutive drops
    rise 2              # Restore state after 2 successful checks
}

vrrp_script check_grpc_control {
    script "/usr/bin/pgrep -f grpc_control_pipeline.py"
    interval 2
    weight -20
    fall 2
    rise 2
}

# 2. VRRP Instance: Telemetry Ingestion (VLAN 100)
vrrp_instance VI_INGESTION {
    state MASTER        # Node 01 acts as default Master
    interface eth0      # Ingestion physical interface vNIC 0
    virtual_router_id 100
    priority 101        # Master priority set higher than Backup (100)
    advert_int 1        # Broadcast VRRP advertisements every 1 second

    authentication {
        auth_type PASS
        auth_pass SecOpsIngestTrustKey100
    }

    virtual_ipaddress {
        10.100.0.100/24 dev eth0 label eth0:vip  # Floating Ingestion VIP
    }

    track_script {
        check_otel_collector
    }
}

# 3. VRRP Instance: Control Plane & gRPC (VLAN 101)
vrrp_instance VI_CONTROL {
    state MASTER
    interface eth1      # Control plane physical interface vNIC 1
    virtual_router_id 101
    priority 101
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass SecOpsControlTrustKey101
    }

    virtual_ipaddress {
        10.101.0.100/24 dev eth1 label eth1:vip  # Floating Control VIP
    }

    track_script {
        check_grpc_control
    }
}
