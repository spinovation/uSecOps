# PostgreSQL Configuration - Transactional Cases Database
# Optimized for 64GB RAM Dedicated host VM

# Connectivity
listen_addresses = '*'
max_connections = 100
port = 5432

# Memory Allocation
shared_buffers = 16GB                  # 25% of VM memory
effective_cache_size = 48GB
maintenance_work_mem = 2GB
work_mem = 64MB

# Write-Ahead Log (WAL)
wal_level = replica
max_wal_size = 8GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# Replication & HA
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/data/archive/%f && cp %p /var/lib/postgresql/data/archive/%f'
max_wal_senders = 10

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 250        # Log queries slower than 250ms
